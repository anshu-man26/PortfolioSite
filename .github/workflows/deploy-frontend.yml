name: Deploy Frontend (Vercel)

# Triggers:
#   - any push to main that changes frontend code
#   - manual run from the GitHub UI
on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch:

# Cancel in-flight deploys when a newer commit lands
concurrency:
  group: deploy-frontend
  cancel-in-progress: true

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    # NOTE: do NOT set working-directory to frontend/ here. The Vercel
    # project's Root Directory is configured as `frontend`, and the
    # Vercel CLI joins cwd + that setting — running from frontend/ would
    # produce `frontend/frontend` and the deploy fails. Run from repo
    # root.

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      # `vercel pull` downloads the env vars + project config into
      # .vercel/. REACT_APP_* env vars are managed in the Vercel
      # dashboard (or Doppler if wired) and come down with this step.
      - name: Pull Vercel project config + env
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      # Vercel builds remotely (no `--prebuilt`) which avoids the
      # `spawn sh ENOENT` flakes the local-build path is prone to. Adds
      # ~90s to the deploy but is rock-solid.
      - name: Deploy
        run: vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }}
